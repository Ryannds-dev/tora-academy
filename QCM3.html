<script>
  const questions = [
    {
      question: "Dans la phrase : « Léo révise ses leçons tous les soirs », quel est le complément circonstanciel ?",
      reponses: [
        { contenu: "A. ses leçons", vraioufaux: false },

    {

        { contenu: "A. demain", vraioufaux: false },
