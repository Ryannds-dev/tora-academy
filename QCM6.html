<script>
  const questions = [
    {
      question: "Comment s’appelle le nombre en bas d’une fraction ?",
      reponses: [
        { contenu: "A. Le partageur", vraioufaux: false },
        { contenu: "B. Le diviseur", vraioufaux: false },
        { contenu: "C. Le dénominateur", vraioufaux: true },
        { contenu: "D. Le multiplicateur", vraioufaux: false },
      ],
    },
    {
      question: "Quelle fraction représente la moitié d’un tout ?",
      reponses: [
        { contenu: "A. 2/2", vraioufaux: false },
        { contenu: "B. 1/3", vraioufaux: false },
        { contenu: "C. 1/2", vraioufaux: true },
        { contenu: "D. 3/4", vraioufaux: false },
      ],
    },
    {
      question: "Tu as une pizza coupée en 6 parts égales. Tu en manges 4. Quelle fraction représente ce que tu as mangé ?",
      reponses: [
        { contenu: "A. 4/6", vraioufaux: true },
        { contenu: "B. 6/4", vraioufaux: false },
        { contenu: "C. 2/6", vraioufaux: false },
        { contenu: "D. 1/6", vraioufaux: false },
      ],
    },
    {
      question: "Que signifie la fraction 3/8 ?",
      reponses: [
        { contenu: "A. J’ai mangé 3 pizzas de 8 parts", vraioufaux: false },
        { contenu: "B. J’ai partagé 3 parts en 8", vraioufaux: false },
        { contenu: "C. J’ai 8 parts sur 3", vraioufaux: false },
        { contenu: "D. J’ai 3 parts sur 8", vraioufaux: true },
      ],
    },
    {
      question: "Pourquoi dit-on que 5/8 est plus pratique que 0,625 dans certains cas ?",
      reponses: [
        { contenu: "A. Parce que 0,625 est plus petit que 5/8", vraioufaux: false },
        { contenu: "B. Parce que 0,625 est trop difficile à calculer", vraioufaux: false },
        { contenu: "C. Parce que 5/8 est plus joli à écrire", vraioufaux: false },
        { contenu: "D. Parce que 5/8 est plus facile à visualiser et à partager", vraioufaux: true },
      ],
    },
  ];
